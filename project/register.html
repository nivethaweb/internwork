<!DOCTYPE html>
<html lang="en">
<head>
    <title>Voter Registration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="regbody">

<div class="regcontainer">
    <div class="reg">
        <h1><img src="https://cdn-icons-png.flaticon.com/128/2920/2920277.png" alt="Register icon"><br>Voter Registration</h1>
        <p>Create your voter account to get started</p>

        <form onsubmit="event.preventDefault(); window.location='login.html';">

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number" maxlength="10" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter email" required>

            <label>Voter ID Number</label>
            <input type="text" placeholder="Enter your voter ID number" required>

            <label>Date of Birth</label>
            <input type="date" required>

            <button type="submit" class="btn1">Register</button>

        </form>
        <br>
        <div class="reg-link">
            Already have an account?<a href="login.html">Login Here</a>
        </div>
    </div>
</div>

</body>
</html>

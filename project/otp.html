<html>
    <head>
        <title>OTP verification</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="otp">
        <div class="popup-overlay" id="successPopup">
            <div class="popup-box">
                <span class="popup-icon">✅</span>
                <h2>Verified Successfully!</h2>
                <p>Your identity has been verified. You can now proceed to cast your vote.</p>
                <button class="popup-btn green" onclick="window.location.href='candidate.html'">Go to Voting Page</button>
            </div>
        </div>

        <div class="popup-overlay" id="errorPopup">
            <div class="popup-box">
                <span class="popup-icon">❌</span>
                <h2>Invalid OTP</h2>
                <p>Please enter all 6 digits correctly and try again.</p>
                <button class="popup-btn orange" onclick="closePopup('errorPopup')">Try Again</button>
            </div>
        </div>

        <div class="mainotp">
            <div>
                <img src="https://cdn-icons-png.flaticon.com/128/7827/7827955.png"><br>
                <h1>OTP Verification</h1>
                <p>Enter the 6-digit code sent to your mobile number</p>
                <div class="otp-box" id="otpInputs">
                    <input type="text" maxlength="1" oninput="moveNext(this,0)">
                    <input type="text" maxlength="1" oninput="moveNext(this,1)">
                    <input type="text" maxlength="1" oninput="moveNext(this,2)">
                    <input type="text" maxlength="1" oninput="moveNext(this,3)">
                    <input type="text" maxlength="1" oninput="moveNext(this,4)">
                    <input type="text" maxlength="1" oninput="moveNext(this,5)">
                </div>
                <div class="photp">
                    <p id="timer">00:30</p>
                    <a href="#" onclick="resendOtp(event)">Resend OTP</a>
                </div>
                <div class="btnotp">
                    <button class="btn bg-success text-light" onclick="verifyOtp()">Verify OTP</button><br>
                    <button class="btn bg-primary"><a class="aa text-light" href="login.html">Back to Login</a></button>
                </div>
            </div>
        </div>

        <script>
            //next box
            function moveNext(el, idx) {
                el.value = el.value.replace(/[^0-9]/g,'');
                const inputs = document.querySelectorAll('.otp-box input');
                if (el.value && idx < 5) inputs[idx+1].focus();
            }

            // Verify
            function verifyOtp() {
                const inputs = document.querySelectorAll('.otp-box input');
                const otp = [...inputs].map(i => i.value).join('');
                if (otp.length === 6) {
                    document.getElementById('successPopup').classList.add('show');
                } else {
                    document.getElementById('errorPopup').classList.add('show');
                }
            }

            function closePopup(id) {
                document.getElementById(id).classList.remove('show');
            }

            //timer
            let seconds = 30;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                seconds--;
                timerEl.textContent = '00:' + String(seconds).padStart(2,'0');
                if (seconds <= 0) {
                    clearInterval(interval);
                    timerEl.textContent = 'Expired';
                    timerEl.style.color = '#ef4444';
                }
            }, 1000);

            function resendOtp(e) {
                e.preventDefault();
                seconds = 30;
                timerEl.style.color = 'rgb(250,139,139)';
                timerEl.textContent = '00:30';
                // clear inputs
                document.querySelectorAll('.otp-box input').forEach(i => i.value = '');
                document.querySelector('.otp-box input').focus();
            }
        </script>
    </body>
</html>

<html>
    <head>
        <title>login page</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="logbody">

        <!-- OTP Sent Popup -->
        <div class="popup-overlay" id="otpPopup">
            <div class="popup-box">
                <span class="popup-icon">📱</span>
                <h2>OTP Sent!</h2>
                <p>A 6-digit OTP has been sent to your mobile number. Please check and enter it on the next page.</p>
                <button class="popup-btn green" onclick="goToOtp()">Continue to OTP</button>
            </div>
        </div>

        <div class="logcontainer">
            <div class="log">
                <h1><img src="https://cdn-icons-png.flaticon.com/128/7278/7278433.png"><br>Voter Login</h1>
                <p>Enter your mobile number to receive OTP</p>
                <br>
                <input type="number" id="mobileInput" placeholder="Enter Mobile Number">
                <br><br>
                <button class="btn1" onclick="sendOtp()">Send OTP</button><br><br>
                <button class="btn2"><a href="index.html">Back to Home</a></button><br><br>
            </div>
            <div class="reg-link">
                New voter <a href="register.html">Register Here</a>
            </div>
        </div>

        <script>
            function sendOtp() {
                const mobile = document.getElementById('mobileInput').value.trim();
                if (mobile.length !== 10) {
                    showError();
                    return;
                }
                document.getElementById('otpPopup').classList.add('show');
            }

            function showError() {
                const input = document.getElementById('mobileInput');
                input.style.borderColor = '#ef4444';
                input.style.boxShadow = '0 0 10px rgba(239,68,68,0.3)';
                input.placeholder = 'Enter valid 10-digit number';
                setTimeout(() => {
                    input.style.borderColor = '#d1d5db';
                    input.style.boxShadow = 'none';
                    input.placeholder = 'Enter Mobile Number';
                }, 2500);
            }

            function goToOtp() {
                window.location.href = 'otp.html';
            }
        </script>
    </body>
</html>

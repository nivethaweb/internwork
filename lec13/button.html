<html>
    <head>
        <title>button click example</title>

    </head>
    <body>
        <h1 id="title">hello</h1>
        <button onclick="changetext()">click me</button>


        <script>
            function changetext(){
                document.getElementById("title").innerText="text change successfully";
            }

        </script>
    </body>
</html>

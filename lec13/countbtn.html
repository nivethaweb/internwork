<!DOCTYPE html>
<html lang="en">
<head>
    <title>counter btn</title>
</head>
<body>
    <h1>Counter: <span id="count">0</span></h1>
    <button onclick="incresCount()">click here</button>

    <script>
        let count=0;
        function incresCount(){
            count++;
            document.getElementById("count").innerText=count;
        }
    </script>
</body>
</html>
